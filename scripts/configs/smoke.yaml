run_id: smoke
data_dir: datasets/tinystories
out_dir: runs/smoke

n_layer: 6
n_head: 6
d_model: 384
d_ff: 1536
ctx_len: 128
vocab_size: 50257

max_steps: 100
micro_batch_size: 4
grad_accum_steps: 1
peak_lr: 1.0e-3
min_lr: 1.0e-4
warmup_steps: 10
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
dropout: 0.0
seed: 42

eval_iters: 20
log_interval: 10
cadence: [0, 25, 50, 75, 100]
resume_interval_steps: 1000
